server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to the CORS proxy service so the browser can reach it
    # on the same origin (no separate port, no extra CORS headers needed).
    # isomorphic-git requests land as: /cors-proxy/<encoded-git-url>
    location /cors-proxy/ {
        proxy_pass http://proxy:9999/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Disable buffering so git progress streaming works correctly
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
