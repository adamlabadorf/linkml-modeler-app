server {
    listen 80;
    server_name _;
    index index.html;

    # SPA fallback — all unknown paths under BASE_PATH serve index.html.
    # __BASE_PATH__ is substituted at Docker build time (default: /).
    # alias strips the BASE_PATH prefix before resolving files so that
    # /linkml-editor/assets/foo.js maps to /usr/share/nginx/html/assets/foo.js.
    location __BASE_PATH__ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to the CORS proxy service so the browser can reach it
    # on the same origin (no separate port, no extra CORS headers needed).
    # isomorphic-git requests land as: __BASE_PATH__cors-proxy/<encoded-git-url>
    location __BASE_PATH__cors-proxy/ {
        proxy_pass http://proxy:9999/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Disable buffering so git progress streaming works correctly
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
