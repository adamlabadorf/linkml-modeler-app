<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="LinkML Modeler App logo">
  <!-- Pointy-top hexagon: center (50,50), radius 44 -->
  <polygon
    points="50,6 88.1,28 88.1,72 50,94 11.9,72 11.9,28"
    fill="none"
    stroke="#2563eb"
    stroke-width="7"
    stroke-linejoin="round"
  />
  <!-- Graph edges connecting 3 internal nodes -->
  <line x1="50" y1="34" x2="67" y2="63" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <line x1="67" y1="63" x2="33" y2="63" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <line x1="33" y1="63" x2="50" y2="34" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="50" cy="34" r="8" fill="#2563eb"/>
  <circle cx="67" cy="63" r="8" fill="#2563eb"/>
  <circle cx="33" cy="63" r="8" fill="#2563eb"/>
</svg>
