id: https://example.org/monty-python
name: monty_python
description: |-
  A LinkML schema for the world of Monty Python and the Holy Grail.
  Knights, quests, shrubberies, and African swallows await.
  Demonstrates classes, enumerations, cross-class ranges, and booleans.
prefixes:
  mp: https://example.org/monty-python/
  linkml: https://w3id.org/linkml/
default_prefix: mp
default_range: string
imports:
  - linkml:types

classes:

  Knight:
    description: A noble knight of the Round Table
    attributes:
      name:
        identifier: true
        required: true
        description: The knight's name
        range: string
      title:
        description: Formal title and honorific
        range: string
      is_brave:
        description: Whether this knight is famously brave (most are, at least initially)
        range: boolean
      specialty:
        description: What this knight is chiefly known for
        range: string
      quest:
        description: The quest currently assigned to this knight
        range: Quest
      round_table:
        description: The Round Table fellowship to which this knight belongs
        range: RoundTable

  RoundTable:
    description: King Arthur's legendary fellowship of knights
    attributes:
      name:
        identifier: true
        required: true
        description: Name of this fellowship
        range: string
      castle:
        description: Home castle of this fellowship
        range: string
      member_count:
        description: Number of knights currently seated at the table
        range: integer

  Quest:
    description: A noble quest undertaken in service of the crown
    attributes:
      name:
        identifier: true
        required: true
        description: Name of the quest
        range: string
      objective:
        description: The primary objective of this quest
        range: string
      difficulty:
        description: How perilous this quest is expected to be
        range: QuestDifficulty
      requires_shrubbery:
        description: Whether a shrubbery must be obtained as part of this quest
        range: boolean

  Shrubbery:
    description: A nice shrubbery — not too expensive, with a path through the middle
    attributes:
      name:
        identifier: true
        required: true
        description: Descriptive name for this shrubbery
        range: string
      price_in_shillings:
        description: Cost in shillings
        range: integer
      has_path:
        description: Whether it has a nice little path through the middle
        range: boolean
      acquired_from:
        description: Where or from whom the shrubbery was obtained
        range: string

  Swallow:
    description: A swallow (African or European) whose coconut-carrying capacity is disputed
    attributes:
      species:
        identifier: true
        required: true
        description: The species of swallow
        range: SwallowSpecies
      airspeed_velocity_mph:
        description: Unladen airspeed velocity in miles per hour
        range: integer
      can_carry_coconut:
        description: Whether this swallow can carry a coconut
        range: boolean

  Witch:
    description: An accused person who may or may not weigh the same as a duck
    attributes:
      name:
        identifier: true
        required: true
        description: The accused's name
        range: string
      weighs_same_as_duck:
        description: Whether she actually weighs the same as a duck
        range: boolean
      verdict:
        description: Outcome of the official duck-weighing trial
        range: WitchVerdict

enums:

  QuestDifficulty:
    description: Expected peril level of a knightly quest
    permissible_values:
      trivial:
        description: A mere flesh wound of a challenge
      moderate:
        description: Requires planning, bravery, and a good shrubbery
      perilous:
        description: Extremely dangerous; beware the rabbit
      legendary:
        description: Only the bravest knight who says Ni may attempt this

  SwallowSpecies:
    description: Species of swallow relevant to coconut-carrying capacity
    permissible_values:
      african:
        description: African swallow — migratory, reportedly stronger
      european:
        description: European swallow — non-migratory; coconut capacity unknown
      unknown:
        description: Species undetermined; the question may itself be a trap

  WitchVerdict:
    description: Possible outcomes of the official duck-weighing trial
    permissible_values:
      witch:
        description: She weighs the same as a duck and is therefore a witch
      not_a_witch:
        description: Weight differs from a duck; not a witch
      inconclusive:
        description: The scales gave no clear answer; further investigation required
