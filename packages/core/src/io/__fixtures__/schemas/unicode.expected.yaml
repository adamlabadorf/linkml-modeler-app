id: https://example.org/unicode
name: unicode
prefixes:
  linkml: https://w3id.org/linkml/
  ex: https://example.org/unicode/
default_prefix: ex
imports:
  - linkml:types
enums:
  Sprache:
    description: Sprache / Language — demonstrates non-ASCII enum keys
    permissible_values:
      Français:
        description: La langue française
      Español:
        description: El idioma español
      日本語:
        description: 日本語（にほんご）
      العربية:
        description: اللغة العربية
classes:
  Café:
    description: Un établissement servant des boissons chaudes et froides (French)
    attributes:
      id:
        description: Identifiant unique / Unique identifier (UTF-8 safe)
        range: string
        identifier: true
      название:
        description: Наименование на русском языке (Russian name field)
        range: string
      bezeichnung:
        description: Bezeichnung auf Deutsch — supports em-dash and Umlauts (äöüÄÖÜß)
        range: string
