id: https://w3id.org/linkml/examples/personinfo
name: personinfo
description: Information about people, based on [schema.org](http://schema.org)
license: https://creativecommons.org/publicdomain/zero/1.0/
prefixes:
  personinfo: https://w3id.org/linkml/examples/personinfo/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  prov: http://www.w3.org/ns/prov#
  GSSO: http://purl.obolibrary.org/obo/GSSO_
  famrel: https://example.org/FamilialRelations#
  bizcodes: https://example.org/bizcodes/
  skos: http://www.w3.org/2004/02/skos/core#
  P: http://example.org/P/
  ROR: http://example.org/ror/
  CODE: http://example.org/code/
  GEO: http://example.org/geoloc/
default_prefix: personinfo
default_range: string
default_curi_maps:
  - semweb_context
imports:
  - linkml:types
subsets:
  basic_subset:
    description: A subset of the schema that handles basic information
types:
  CrossReference:
    uri: rdfs:Resource
    description: A string URI or CURIE representation of an external identifier, modeled as a Resource in RDF
    typeof: uriorcurie
    base: str
  ImageURL:
    uri: xsd:anyURI
    typeof: uri
    base: str
  SalaryType:
    typeof: decimal
slots:
  id:
    range: uriorcurie
    identifier: true
    slot_uri: schema:identifier
  int_id:
    range: integer
    identifier: true
    slot_uri: schema:int_identifier
  name:
    required: true
    slot_uri: schema:name
  description:
    slot_uri: schema:description
  image:
    slot_uri: schema:image
  gender:
    range: GenderType
    slot_uri: schema:gender
  telephone:
    slot_uri: schema:telephone
  primary_email:
    slot_uri: schema:email
  birth_date:
    slot_uri: schema:birthDate
  employed_at:
    range: Organization
  is_current:
    range: boolean
  has_employment_history:
    range: EmploymentEvent
    multivalued: true
    inlined_as_list: true
  has_medical_history:
    range: MedicalEvent
    multivalued: true
    inlined_as_list: true
  has_familial_relationships:
    range: FamilialRelationship
    multivalued: true
    inlined_as_list: true
  has_interpersonal_relationships:
    range: InterPersonalRelationship
    multivalued: true
    inlined_as_list: true
  in_location:
    range: Place
  current_address:
    description: The address at which a person currently lives
    range: Address
  age_in_years:
    range: integer
    alias: age
  score:
    description: A score between 0 and 5, represented as a decimal
    range: decimal
  related_to:
    range: Person
  depicted_by:
    range: ImageURL
  type: {}
  street: {}
  city: {}
  mission_statement: {}
  founding_date: {}
  founding location:
    range: Place
  postal_code:
    range: string
  started_at_time:
    range: date
    slot_uri: prov:startedAtTime
  duration:
    range: float
  diagnosis:
    range: DiagnosisConcept
    inlined: true
  procedure:
    range: ProcedureConcept
    inlined: true
  ended_at_time:
    range: date
    slot_uri: prov:endedAtTime
  persons:
    range: Person
    multivalued: true
    inlined: true
    inlined_as_list: true
  organizations:
    range: Organization
    multivalued: true
    inlined: true
    inlined_as_list: true
  places:
    range: Place
    multivalued: true
    inlined: true
    inlined_as_list: true
  categories:
    multivalued: true
  salary:
    range: SalaryType
  min_salary:
    range: SalaryType
enums:
  FamilialRelationshipType:
    permissible_values:
      SIBLING_OF:
        meaning: famrel:01
      PARENT_OF:
        meaning: famrel:02
      CHILD_OF:
        meaning: famrel:03
  NonFamilialRelationshipType:
    permissible_values:
      COWORKER_OF:
        meaning: famrel:70
      ROOMMATE_OF:
        meaning: famrel:71
      BEST_FRIEND_OF: null
      MORTAL_ENEMY_OF: null
  GenderType:
    permissible_values:
      nonbinary man:
        meaning: GSSO:009254
      nonbinary woman:
        meaning: GSSO:009253
      transgender woman:
        meaning: GSSO:000384
      transgender man:
        meaning: GSSO:000372
      cisgender man:
        meaning: GSSO:000371
      cisgender woman:
        meaning: GSSO:000385
  DiagnosisType:
    permissible_values:
      todo: null
  OrganizationType:
    permissible_values:
      non profit: null
      for profit: null
      offshore: null
      charity:
        meaning: bizcodes:001
      shell company: null
      loose organization: null
classes:
  NamedThing:
    description: A generic grouping for any identifiable entity
    slots:
      - id
      - name
      - description
      - depicted_by
  Person:
    description: A person (alive, dead, undead, or fictional).
    is_a: NamedThing
    mixins:
      - HasAliases
      - HasNewsEvents
    class_uri: schema:Person
    slots:
      - primary_email
      - birth_date
      - age_in_years
      - gender
      - current_address
      - telephone
      - has_employment_history
      - has_familial_relationships
      - has_interpersonal_relationships
      - has_medical_history
    slot_usage:
      primary_email: {}
      age_in_years:
        recommended: true
      telephone:
        recommended: true
    in_subset:
      - basic_subset
  HasAliases:
    description: A mixin applied to any class that can have aliases/alternateNames
    mixin: true
    attributes:
      aliases:
        multivalued: true
        exact_mappings:
          - schema:alternateName
        singular_name: alias
  NewsEvent:
    is_a: Event
    attributes:
      headline: {}
  HasNewsEvents:
    mixin: true
    attributes:
      has_news_events:
        range: NewsEvent
        multivalued: true
        singular_name: has_news_event
  Organization:
    description: An organization such as a company or university
    is_a: NamedThing
    mixins:
      - HasAliases
      - HasNewsEvents
    class_uri: schema:Organization
    slots:
      - mission_statement
      - founding_date
      - founding location
      - categories
      - score
      - min_salary
    slot_usage:
      categories:
        range: OrganizationType
    rules:
      - preconditions:
          slot_conditions:
            min_salary:
              maximum_value: 80000
        postconditions:
          slot_conditions:
            score:
              maximum_value: 0
  Place:
    mixins:
      - HasAliases
    slots:
      - id
      - name
      - depicted_by
  Address:
    class_uri: schema:PostalAddress
    slots:
      - street
      - city
      - postal_code
  Event:
    slots:
      - started_at_time
      - ended_at_time
      - duration
      - is_current
  Concept:
    is_a: NamedThing
    attributes:
      code system:
        range: code system
      mappings:
        range: CrossReference
        multivalued: true
        slot_uri: skos:exactMatch
  DiagnosisConcept:
    is_a: Concept
  ProcedureConcept:
    is_a: Concept
  IntegerPrimaryKeyObject:
    slots:
      - int_id
  OperationProcedureConcept:
    is_a: ProcedureConcept
  ImagingProcedureConcept:
    is_a: ProcedureConcept
  code system:
    slots:
      - id
      - name
  Relationship:
    slots:
      - started_at_time
      - ended_at_time
      - related_to
      - type
  FamilialRelationship:
    is_a: Relationship
    slot_usage:
      type:
        range: FamilialRelationshipType
        required: true
      related to:
        range: Person
        required: true
  InterPersonalRelationship:
    is_a: Relationship
    slot_usage:
      type:
        required: true
        any_of:
          - range: FamilialRelationshipType
          - range: NonFamilialRelationshipType
      related to:
        range: Person
        required: true
  EmploymentEvent:
    is_a: Event
    slots:
      - employed_at
      - salary
  MedicalEvent:
    is_a: Event
    mixins:
      - WithLocation
    slots:
      - diagnosis
      - procedure
  WithLocation:
    mixin: true
    slots:
      - in_location
  Container:
    tree_root: true
    slots:
      - persons
      - organizations
      - places
emit_prefixes:
  - rdf
  - rdfs
  - xsd
  - skos
